spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

cloud:
  aws:
    region:
      static: ${AWS_REGION:ap-northeast-2}
    stack:
      auto: false
    s3:
      bucket: ${AWS_S3_BUCKET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
